<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Quem está assistindo?</h1>
      </header>

      <section class="profiles" aria-label="Seleção de perfis">
        <ul>
          <li>
            <button class="profile" aria-label="Selecionar perfil Perfil 1">
              <figure>
                <img
                  src="/Netflix/assets/perfil1.png"
                  alt="Imagem que mostra uma pessoa séria"
                  width="150"
                />
                <figcaption>Perfil 1</figcaption>
              </figure>
            </button>
          </li>
          <li>
            <button class="profile" aria-label="Selecionar perfil Perfil 2">
              <figure>
                <img
                  src="/Netflix/assets/perfil2.png"
                  alt="Imagem de um bone azul"
                  width="150"
                />
                <figcaption>Perfil 2</figcaption>
              </figure>
            </button>
          </li>
        </ul>
      </section>
    </main>

    <!-- Script para gerenciar Dark Mode / Light Mode -->
    <script src="theme.js"></script>
  </body>
</html>
